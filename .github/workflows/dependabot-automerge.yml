name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Auto-merge patch/minor Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        id: metadata
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch/minor
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip major without HUMAN label
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          labels="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          if echo "$labels" | grep -q 'HUMAN'; then
            gh pr merge --auto --squash "$PR_URL"
          else
            echo "Major Dependabot bumps require the HUMAN label; manual merge only"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Reminder
        run: |
          echo "Dependabot auto-merge requires branch protection: CI + Dependency Review must pass before merge."
