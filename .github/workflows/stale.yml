name: Stale

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: This issue has been marked stale due to inactivity. It will close in 14 days unless updated.
          close-issue-message: Closing due to prolonged inactivity. Reopen if still relevant.
          stale-pr-message: This pull request has been marked stale due to inactivity.
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: template-improvement
          exempt-pr-labels: template-improvement,HUMAN
