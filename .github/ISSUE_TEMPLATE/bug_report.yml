name: Bug Report
description: Report a bug in the template or a project bootstrapped from it
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: dropdown
    id: stack
    attributes:
      label: Stack
      options:
        - Web/PWA
        - Python
        - Android
        - Lightroom
        - Template (general)
    validations:
      required: true
  - type: input
    id: template-version
    attributes:
      label: Template Version
      description: Value from .template-version
      placeholder: "0.7.1"
