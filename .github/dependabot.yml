version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /examples/web
    schedule:
      interval: weekly
    groups:
      web-dependencies:
        patterns: ["*"]
    ignore:
      # v5 removes addCandlestickSeries / addLineSeries / setMarkers (R-Audit-7.1 / F-001)
      - dependency-name: "lightweight-charts"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /examples/node
    schedule:
      interval: weekly
    groups:
      node-dependencies:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      root-python-dependencies:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /examples/python
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: gradle
    directory: /examples/android
    schedule:
      interval: weekly
    groups:
      android-dependencies:
        patterns: ["*"]
